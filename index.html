<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灯塔点亮倒计时</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url("backgroud.jpg") no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      height: 100vh;
      overflow: hidden;
      font-family: "微软雅黑", Arial, sans-serif;
      position: relative;
      color: #fff;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 30, 20, 0.18);
      z-index: 1;
    }

    .screen-container {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
    }

    .countdown-wrapper {
      position: absolute;
      right: 2.5vw;
      bottom: 2.5vh;
      width: 66.6667%;
      height: auto;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 0;
    }

    .countdown-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.2vh;
      transform: translateY(-2vh);
    }

    .countdown-logo {
      width: clamp(80px, 7vw, 140px);
      height: auto;
      display: block;
      margin: 0 auto 6px auto;
      filter: brightness(0) invert(1);
    }

    .countdown-title {
      font-size: clamp(34px, 3.6vw, 68px);
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
      letter-spacing: 1px;
      margin-bottom: 0.5vh;
    }

    .countdown-subtitle {
      font-size: clamp(14px, 1.15vw, 24px);
      font-weight: 500;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      letter-spacing: 0.5px;
      margin-top: -0.4vh;
      margin-bottom: 0.8vh;
    }

    .countdown-cards {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2vw;
      flex-wrap: nowrap;
    }

    .countdown-card {
      width: clamp(105px, 9vw, 170px);
      height: clamp(135px, 12vw, 210px);
      background: rgba(10, 18, 24, 0.72);
      border: 2px solid #00c853;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 18px rgba(0, 200, 83, 0.45),
        inset 0 0 18px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .countdown-num {
      font-size: clamp(52px, 5.2vw, 96px);
      font-weight: 900;
      line-height: 1;
      color: #00d95f;
      text-shadow: 0 0 10px rgba(0, 217, 95, 0.25);
    }

    .countdown-label {
      margin-top: 12px;
      font-size: clamp(16px, 1.2vw, 24px);
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (max-width: 1200px) {
      .countdown-wrapper {
        width: 70%;
      }

      .countdown-cards {
        gap: 12px;
      }
    }

    @media (max-width: 900px) {
      .countdown-wrapper {
        width: 100%;
        right: 0;
        bottom: 0;
        padding: 20px;
      }

      .countdown-box {
        transform: none;
      }

      .countdown-cards {
        flex-wrap: wrap;
      }

      .countdown-logo {
        width: clamp(160px, 30vw, 260px);
      }
    }
  </style>
</head>
<body>
  <div class="screen-container">
    <div class="countdown-wrapper">
      <div class="countdown-box">
        <img src="Schneider_CN.png" alt="Schneider Electric Logo" class="countdown-logo" />
        <div class="countdown-title">灯塔点亮倒计时...</div>
        <div class="countdown-subtitle">Countdown to Lighthouse Campus Audit</div>

        <div class="countdown-cards">
          <div class="countdown-card">
            <div class="countdown-num" id="days">00</div>
            <div class="countdown-label">DAYS</div>
          </div>

          <div class="countdown-card">
            <div class="countdown-num" id="hours">00</div>
            <div class="countdown-label">HOURS</div>
          </div>

          <div class="countdown-card">
            <div class="countdown-num" id="minutes">00</div>
            <div class="countdown-label">MINUTES</div>
          </div>

          <div class="countdown-card">
            <div class="countdown-num" id="seconds">00</div>
            <div class="countdown-label">SECONDS</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    const TARGET_TIME = new Date("2026-04-20 23:59:59").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = TARGET_TIME - now;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      const formatNum = (num) => num.toString().padStart(2, "0");

      daysEl.textContent = formatNum(days);
      hoursEl.textContent = formatNum(hours);
      minutesEl.textContent = formatNum(minutes);
      secondsEl.textContent = formatNum(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
