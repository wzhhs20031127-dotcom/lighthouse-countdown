<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灯塔点亮倒计时</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url("backgroud.jpg") no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      height: 100vh;
      overflow: hidden;
      font-family: "微软雅黑", Arial, sans-serif;
      position: relative;
      color: #fff;
    }

    /* 轻微遮罩，保证文字可读性 */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 25, 18, 0.12);
      z-index: 1;
    }

    .screen-container {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
    }

    /* 左侧倒计时区域 */
    .countdown-wrapper {
      position: absolute;
      left: 3.5%;
      top: 0;
      width: 62%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2vw;
    }

    .countdown-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 1.8vh;
      transform: translateY(-1vh);
    }

    .countdown-title {
      font-size: clamp(42px, 4.4vw, 78px);
      font-weight: 800;
      color: #ffffff;
      text-align: left;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.38);
      letter-spacing: 1px;
      margin-bottom: 1.4vh;
    }

    .countdown-cards {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 1.3vw;
      flex-wrap: nowrap;
    }

    .countdown-card {
      width: clamp(110px, 9.2vw, 175px);
      height: clamp(145px, 12.4vw, 220px);
      background: rgba(12, 20, 28, 0.66);
      border: 2px solid #00dd66;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 18px rgba(0, 221, 102, 0.34),
        inset 0 0 20px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .countdown-num {
      font-size: clamp(56px, 5.6vw, 102px);
      font-weight: 900;
      line-height: 1;
      color: #00e96f;
      text-shadow: 0 0 10px rgba(0, 233, 111, 0.22);
    }

    .countdown-label {
      margin-top: 14px;
      font-size: clamp(14px, 1.2vw, 24px);
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* 右下角 logo 信息区 */
    .brand-box {
      position: absolute;
      right: 4%;
      bottom: 4%;
      z-index: 3;
      width: clamp(180px, 17vw, 280px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }

    .brand-logo {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0) invert(1);
      margin-bottom: 10px;
      opacity: 0.96;
    }

    .brand-cn {
      font-size: clamp(16px, 1.7vw, 30px);
      letter-spacing: 0.42em;
      color: #ffffff;
      line-height: 1.2;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.32);
      margin-bottom: 8px;
      padding-left: 0.42em; /* 视觉上抵消 letter-spacing 最后一个字符空隙 */
      white-space: nowrap;
    }

    .brand-en {
      font-size: clamp(11px, 0.95vw, 16px);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.96);
      line-height: 1.35;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    @media (max-width: 1200px) {
      .countdown-wrapper {
        width: 66%;
      }

      .countdown-cards {
        gap: 12px;
      }

      .brand-box {
        right: 3%;
        bottom: 3%;
      }
    }

    @media (max-width: 900px) {
      .countdown-wrapper {
        width: 100%;
        left: 0;
        padding: 20px;
      }

      .countdown-box {
        align-items: center;
        transform: none;
      }

      .countdown-title {
        text-align: center;
      }

      .countdown-cards {
        justify-content: center;
        flex-wrap: wrap;
      }

      .brand-box {
        width: 180px;
        right: 16px;
        bottom: 16px;
      }

      .brand-cn,
      .brand-en {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="screen-container">
    <!-- 左侧倒计时 -->
    <div class="countdown-wrapper">
      <div class="countdown-box">
        <div class="countdown-title">灯塔点亮倒计时...</div>

        <div class="countdown-cards">
          <div class="countdown-card">
            <div class="countdown-num" id="days">00</div>
            <div class="countdown-label">DAYS</div>
          </div>

          <div class="countdown-card">
            <div class="countdown-num" id="hours">00</div>
            <div class="countdown-label">HOURS</div>
          </div>

          <div class="countdown-card">
            <div class="countdown-num" id="minutes">00</div>
            <div class="countdown-label">MINUTES</div>
          </div>

          <div class="countdown-card">
            <div class="countdown-num" id="seconds">00</div>
            <div class="countdown-label">SECONDS</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右下角 logo 区 -->
    <div class="brand-box">
      <img src="Schneider_CN.png" alt="Schneider Electric Logo" class="brand-logo" />
      <div class="brand-cn">施耐德电气</div>
      <div class="brand-en">Countdown to Lighthouse Campus Audit</div>
    </div>
  </div>

  <script>
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    const TARGET_TIME = new Date("2026-04-20 23:59:59").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = TARGET_TIME - now;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      const formatNum = (num) => num.toString().padStart(2, "0");

      daysEl.textContent = formatNum(days);
      hoursEl.textContent = formatNum(hours);
      minutesEl.textContent = formatNum(minutes);
      secondsEl.textContent = formatNum(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
